{% extends "base.html" %}

{% block title %}Đăng nhập - Sectify{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-primary text-white text-center">
                <h4><i class="fa-solid fa-user me-2"></i>Đăng nhập</h4>
            </div>
            <div class="card-body">
                <div id="login-alert" class="alert alert-danger d-none" role="alert"></div>
                <div class="console-output alert alert-info d-none mt-2 mb-2"></div>
                
                <div id="login-form">
                    <form id="loginForm">
                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" name="email" required>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Mật khẩu</label>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Đăng nhập</button>
                    </form>
                </div>
                
                <div id="otp-form" class="d-none">
                    <div class="alert alert-info" role="alert">
                        Mã xác thực đã được gửi đến email của bạn. Vui lòng nhập mã để hoàn tất đăng nhập.
                    </div>
                    <form id="otpForm">
                        <div class="mb-3">
                            <label for="otp" class="form-label">Mã xác thực (OTP)</label>
                            <input type="text" class="form-control" id="otp" name="otp" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Xác nhận</button>
                    </form>
                </div>
                
                <div class="mt-3 text-center">
                    <p>Chưa có tài khoản? <a href="/auth/signup">Đăng ký ngay</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block additional_js %}
<script src="/static/js/auth.js"></script>
{% endblock %}
